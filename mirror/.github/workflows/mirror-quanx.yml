name: Mirror QuanX remotes

on:
  workflow_dispatch:
  schedule:
    - cron: "23 2 * * *"  # 每天 10:23 (UTC+8 约等于 10:23)

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mirror files
        shell: bash
        run: |
          set -euo pipefail

          SRC_FILE="mirror/sources.txt"
          OUT_DIR="mirror/files"
          mkdir -p "$OUT_DIR"

          if [ ! -f "$SRC_FILE" ]; then
            echo "Missing $SRC_FILE"
            exit 1
          fi

          # 清理空行和注释行（以#开头）
          mapfile -t URLS < <(grep -vE '^\s*$|^\s*#' "$SRC_FILE" || true)

          if [ "${#URLS[@]}" -eq 0 ]; then
            echo "No URLs found in $SRC_FILE"
            exit 1
          fi

          i=0
          for url in "${URLS[@]}"; do
            i=$((i+1))

            # 生成稳定文件名：按顺序编号 + 原始文件名
            base="$(basename "${url%%\?*}")"
            if [ -z "$base" ] || [[ "$base" == */ ]]; then
              base="file_${i}.txt"
            fi
            out="$OUT_DIR/$(printf '%03d' "$i")_$base"

            echo "[$i/${#URLS[@]}] Fetch: $url -> $out"
            curl -fsSL --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 60 "$url" -o "$out"
          done

          echo "Done. Total: ${#URLS[@]}"

      - name: Commit changes if any
        shell: bash
        run: |
          set -euo pipefail
          if git status --porcelain | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add mirror/files
            git commit -m "chore: mirror update"
            git push
          else
            echo "No changes."
          fi
